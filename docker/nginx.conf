user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens   off;
    client_max_body_size 20M;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        root /var/www/html/public;
        index index.html index.php;

        # ---- API Laravel ----
        location /api {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # ---- Rutas Laravel auxiliares (Sanctum, health, etc.) ----
        location /sanctum {
            try_files $uri $uri/ /index.php?$query_string;
        }
        location = /up {
            try_files $uri /index.php?$query_string;
        }

        # ---- Front controller PHP (solo index.php) ----
        location ~ ^/index\.php(/|$) {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
            fastcgi_read_timeout 60s;
            internal;
        }

        # ---- Assets estáticos con hash (cache larga) ----
        location ~* \.(?:css|js|mjs|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp)$ {
            try_files $uri =404;
            expires 30d;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        # ---- Frontend Angular (SPA): todo lo demás cae a index.html ----
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Bloquear archivos ocultos (excepto .well-known).
        location ~ /\.(?!well-known) {
            deny all;
        }
    }
}
